<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700">
  <defs>
    <style>
      .title { font-family: monospace; font-size: 20px; fill: #fff; font-weight: bold; }
      .subtitle { font-family: monospace; font-size: 12px; fill: #888; }
      .box { fill: #1a1a2e; stroke: #4a9eff; stroke-width: 2; rx: 6; }
      .box-audio { fill: #1a1a2e; stroke: #ff6b6b; stroke-width: 2; rx: 6; }
      .box-midi { fill: #1a1a2e; stroke: #4ecdc4; stroke-width: 2; rx: 6; }
      .box-osc { fill: #1a1a2e; stroke: #ffe66d; stroke-width: 2; rx: 6; }
      .box-ir { fill: #1a1a2e; stroke: #a855f7; stroke-width: 2; rx: 6; }
      .box-render { fill: #1a1a2e; stroke: #22c55e; stroke-width: 2; rx: 6; }
      .box-output { fill: #1a1a2e; stroke: #f472b6; stroke-width: 2; rx: 6; }
      .text { font-family: monospace; font-size: 11px; fill: #fff; }
      .text-small { font-family: monospace; font-size: 9px; fill: #aaa; }
      .text-label { font-family: monospace; font-size: 10px; fill: #666; text-anchor: middle; }
    </style>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a9eff"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b6b"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ecdc4"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ffe66d"/>
    </marker>
  </defs>
  
  <rect width="950" height="700" fill="#0a0a14"/>
  
  <text x="475" y="28" class="title" text-anchor="middle">ascii-cam Architecture</text>
  <text x="475" y="46" class="subtitle" text-anchor="middle">Real-time Audio-Reactive ASCII Video with MIDI/OSC IO</text>
  
  <text x="100" y="75" class="text-label">INPUTS</text>
  <text x="420" y="75" class="text-label">PROCESSING</text>
  <text x="780" y="75" class="text-label">OUTPUT</text>
  
  <!-- Camera Input -->
  <rect x="30" y="90" width="140" height="55" class="box"/>
  <text x="100" y="110" class="text" text-anchor="middle">Camera</text>
  <text x="100" y="126" class="text-small" text-anchor="middle">nokhwa</text>
  <text x="100" y="138" class="text-small" text-anchor="middle">V4L2/MSMF/AVF</text>
  
  <!-- Audio Input -->
  <rect x="30" y="160" width="140" height="55" class="box-audio"/>
  <text x="100" y="180" class="text" text-anchor="middle">Audio Input</text>
  <text x="100" y="196" class="text-small" text-anchor="middle">cpal</text>
  <text x="100" y="208" class="text-small" text-anchor="middle">ALSA/WASAPI/CoreAudio</text>
  
  <!-- MIDI Input -->
  <rect x="30" y="230" width="140" height="55" class="box-midi"/>
  <text x="100" y="250" class="text" text-anchor="middle">MIDI Input</text>
  <text x="100" y="266" class="text-small" text-anchor="middle">midir (CC→params)</text>
  
  <!-- OSC Input -->
  <rect x="30" y="300" width="140" height="55" class="box-osc"/>
  <text x="100" y="320" class="text" text-anchor="middle">OSC Input</text>
  <text x="100" y="336" class="text-small" text-anchor="middle">rosc UDP recv</text>
  
  <!-- IR/Depth Input -->
  <rect x="30" y="370" width="140" height="40" class="box-ir"/>
  <text x="100" y="390" class="text" text-anchor="middle">IR/Depth</text>
  <text x="100" y="402" class="text-small" text-anchor="middle">RealSense/Kinect</text>
  
  <!-- OSC Output -->
  <rect x="580" y="230" width="140" height="55" class="box-osc"/>
  <text x="650" y="250" class="text" text-anchor="middle">OSC Output</text>
  <text x="650" y="266" class="text-small" text-anchor="middle">rosc UDP send</text>
  
  <!-- Frame Processing -->
  <rect x="220" y="90" width="130" height="50" class="box"/>
  <text x="285" y="110" class="text" text-anchor="middle">Resize + Grayscale</text>
  <text x="285" y="126" class="text-small" text-anchor="middle">image crate</text>
  
  <!-- Sobel Edge Detection -->
  <rect x="220" y="155" width="130" height="50" class="box"/>
  <text x="285" y="175" class="text" text-anchor="middle">Sobel Edge Detect</text>
  <text x="285" y="191" class="text-small" text-anchor="middle">|Gx| + |Gy| fast</text>
  
  <!-- FFT Analysis -->
  <rect x="220" y="160" width="130" height="50" class="box-audio"/>
  <rect x="220" y="155" width="130" height="50" fill="transparent"/>
  <text x="285" y="175" class="text" text-anchor="middle">FFT Analysis</text>
  <text x="285" y="191" class="text-small" text-anchor="middle">rustfft 1024 samples</text>
  
  <!-- BPM Detection -->
  <rect x="220" y="220" width="130" height="45" class="box-audio"/>
  <text x="285" y="240" class="text" text-anchor="middle">BPM Detector</text>
  <text x="285" y="255" class="text-small" text-anchor="middle">weighted avg + confidence</text>
  
  <!-- MIDI Mapping -->
  <rect x="220" y="280" width="130" height="40" class="box-midi"/>
  <text x="285" y="298" class="text" text-anchor="middle">MIDI→Params</text>
  <text x="285" y="310" class="text-small" text-anchor="middle">CC mapping config</text>
  
  <!-- Layer Classification -->
  <rect x="400" y="90" width="140" height="55" class="box"/>
  <text x="470" y="110" class="text" text-anchor="middle">Layer Classification</text>
  <text x="470" y="126" class="text-small" text-anchor="middle">Black|BG|FG|Edge|White|IR</text>
  
  <!-- Band Energy Extraction -->
  <rect x="400" y="160" width="140" height="55" class="box-audio"/>
  <text x="470" y="180" class="text" text-anchor="middle">Band Energy</text>
  <text x="470" y="196" class="text-small" text-anchor="middle">Bass|Mid|High (normalized)</text>
  
  <!-- IR Processing -->
  <rect x="400" y="230" width="140" height="45" class="box-ir"/>
  <text x="470" y="250" class="text" text-anchor="middle">IR Enhancement</text>
  <text x="470" y="265" class="text-small" text-anchor="middle">detail boost + depth mapping</text>
  
  <!-- Rendering Pipeline -->
  <rect x="220" y="340" width="320" height="100" class="box-render"/>
  <text x="380" y="360" class="text" text-anchor="middle">RENDERING PIPELINE</text>
  <text x="380" y="380" class="text-small" text-anchor="middle">1. Band Lookup (O(1)) → 2. Charset Select → 3. Blend Mode</text>
  <text x="380" y="395" class="text-small" text-anchor="middle">4. Detail Filter → 5. Color Output → 6. Char Selection</text>
  <text x="380" y="415" class="text-small" text-anchor="middle">Blend: +add -sub ~inv *mul /div ^xor ^xnd</text>
  
  <!-- Terminal Output -->
  <rect x="620" y="90" width="290" height="130" class="box-output"/>
  <text x="765" y="115" class="text" text-anchor="middle">TERMINAL OUTPUT</text>
  <text x="765" y="145" class="text-small" text-anchor="middle">┌──────────────────────────────────────┐</text>
  <text x="765" y="160" class="text-small" text-anchor="middle">│ #@$%&amp;*▓▒░ ██▓▒░ ASCII ░▒▓██ │</text>
  <text x="765" y="175" class="text-small" text-anchor="middle">│ RENDERED ███▓▒░ VIDEO ░▒▓███ │</text>
  <text x="765" y="190" class="text-small" text-anchor="middle">│ @#%&amp;*▓▒░ ░▒▓██ ██▓▒░ ░▒▓██ │</text>
  <text x="765" y="205" class="text-small" text-anchor="middle">└──────────────────────────────────────┘</text>
  
  <text x="765" y="225" class="text" text-anchor="middle">STATUS BAR</text>
  <text x="765" y="245" class="text-small" text-anchor="middle">1:Bass ████░░ 2:Mid ██░░░░ 3:High █░░░░░</text>
  <text x="765" y="260" class="text-small" text-anchor="middle">120BPM 85% | MIDI:(2m) | OSC l:7000→localhost:8000</text>
  <text x="765" y="275" class="text-small" text-anchor="middle">Neon Noir | ctr:1.0 react:1.0 | Latin</text>
  <text x="765" y="290" class="text-small" text-anchor="middle">[inv] | sz:1 | m:MIDI d:OSC | g Q</text>
  
  <!-- Arrows INPUTS -->
  <line x1="170" y1="117" x2="218" y2="115" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="170" y1="187" x2="218" y2="182" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="170" y1="257" x2="218" y2="300" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <line x1="170" y1="327" x2="218" y2="340" stroke="#ffe66d" stroke-width="2" marker-end="url(#arrow-yellow)"/>
  <line x1="170" y1="390" x2="218" y2="340" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-purple)"/>
  
  <!-- Arrows PROCESSING -->
  <line x1="285" y1="140" x2="285" y2="155" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="285" y1="210" x2="285" y2="220" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="285" y1="265" x2="285" y2="280" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  
  <!-- Arrows MIDI→Params -->
  <line x1="350" y1="300" x2="470" y2="187" stroke="#4ecdc4" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#arrow-cyan)"/>
  <text x="400" y="240" class="text-small" fill="#4ecdc4">CC→params</text>
  
  <!-- Arrows to Layer/Band -->
  <line x1="350" y1="115" x2="398" y2="117" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="350" y1="187" x2="398" y2="187" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="470" y1="145" x2="470" y2="160" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="470" y1="215" x2="470" y2="230" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="540" y1="187" x2="540" y2="340" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <!-- Arrows to Render -->
  <line x1="470" y1="275" x2="380" y2="350" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  
  <!-- Arrows OSC Output -->
  <line x1="540" y1="350" x2="580" y2="257" stroke="#ffe66d" stroke-width="2" marker-end="url(#arrow-yellow)"/>
  <text x="555" y="310" class="text-small" fill="#ffe66d">/ascii/*</text>
  
  <!-- Arrows to Terminal -->
  <line x1="540" y1="390" x2="618" y2="155" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  
  <!-- Legend -->
  <rect x="30" y="440" width="200" height="150" fill="none" stroke="#444" rx="4"/>
  <text x="130" y="460" class="text-label">LEGEND</text>
  
  <line x1="45" y1="480" x2="65" y2="480" stroke="#4a9eff" stroke-width="3"/>
  <text x="75" y="484" class="text-small">Video/Frame</text>
  
  <line x1="45" y1="500" x2="65" y2="500" stroke="#ff6b6b" stroke-width="3"/>
  <text x="75" y="504" class="text-small">Audio</text>
  
  <line x1="45" y1="520" x2="65" y2="520" stroke="#4ecdc4" stroke-width="3"/>
  <text x="75" y="524" class="text-small">MIDI</text>
  
  <line x1="45" y1="540" x2="65" y2="540" stroke="#ffe66d" stroke-width="3"/>
  <text x="75" y="544" class="text-small">OSC</text>
  
  <line x1="45" y1="560" x2="65" y2="560" stroke="#a855f7" stroke-width="3"/>
  <text x="75" y="564" class="text-small">IR/Depth</text>
  
  <line x1="45" y1="580" x2="65" y2="580" stroke="#22c55e" stroke-width="3"/>
  <text x="75" y="584" class="text-small">Render/Output</text>
  
  <!-- Performance -->
  <rect x="250" y="440" width="220" height="150" fill="none" stroke="#444" rx="4"/>
  <text x="360" y="460" class="text-label">PERFORMANCE</text>
  <text x="260" y="480" class="text-small">~30 FPS target</text>
  <text x="260" y="498" class="text-small">FFT: 1024 samples @ 43Hz</text>
  <text x="260" y="516" class="text-small">Sobel: |Gx|+|Gy| fast approx</text>
  <text x="260" y="534" class="text-small">Band lookup: O(1) per pixel</text>
  <text x="260" y="552" class="text-small">Lock-free: Arc&lt;Mutex&gt;</text>
  <text x="260" y="570" class="text-small">MIDI/OSC: background threads</text>
  <text x="260" y="588" class="text-small">OSC out: each frame</text>
  
  <!-- Data Types -->
  <rect x="490" y="440" width="220" height="150" fill="none" stroke="#444" rx="4"/>
  <text x="600" y="460" class="text-label">DATA STRUCTURES</text>
  <text x="500" y="480" class="text-small">BandEnergy: bass,mid,high,bpm,</text>
  <text x="500" y="495" class="text-small">  beat,confidence,ir_*,depth</text>
  <text x="500" y="515" class="text-small">MidiState: note,vel,cc[128],</text>
  <text x="500" y="530" class="text-small">  pitch_bend,modulation</text>
  <text x="500" y="550" class="text-small">VisualLayer: Black|BG|FG|</text>
  <text x="500" y="565" class="text-small">  Edge|White|IrEnhanced</text>
  <text x="500" y="585" class="text-small">BandMode: +add|-sub|~inv|</text>
  
  <!-- Crates -->
  <rect x="730" y="440" width="190" height="150" fill="none" stroke="#444" rx="4"/>
  <text x="825" y="460" class="text-label">DEPENDENCIES</text>
  <text x="740" y="480" class="text-small">nokhwa - camera access</text>
  <text x="740" y="498" class="text-small">cpal - audio I/O</text>
  <text x="740" y="516" class="text-small">rustfft - FFT analysis</text>
  <text x="740" y="534" class="text-small">crossterm - terminal UI</text>
  <text x="740" y="552" class="text-small">image - processing</text>
  <text x="740" y="570" class="text-small">midir - MIDI input</text>
  <text x="740" y="588" class="text-small">rosc - OSC UDP</text>
  
  <!-- Version -->
  <text x="475" y="680" class="text-label">v0.1.0 | 2026-03-31 | MIDI/OSC IO Complete</text>
</svg>
